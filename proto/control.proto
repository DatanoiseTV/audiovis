syntax = "proto3";

// Wire protocol for the web control surface. This single file is the source of
// truth: the Rust server compiles it with prost, and the browser parses this
// very text at runtime with protobuf.js. Keep the two ends in sync by never
// hand-rolling either side.
package audiovis;

// --- Server -> client ---

message ParamSpec {
  string path = 1;   // unique dotted id, e.g. "layer.0.opacity"
  string name = 2;   // display label
  string group = 3;  // UI section
  string kind = 4;   // "float" | "bool" | "int" | "trigger"
  float min = 5;
  float max = 6;
  string unit = 7;
}

message ParamValue {
  string path = 1;
  float value = 2;   // raw value
  float norm = 3;    // position in 0..1, for widgets
}

message Telemetry {
  float low = 1;
  float mid = 2;
  float high = 3;
  float rms = 4;
  float beat = 5;
  float bpm = 6;
  float beat_phase = 7;
  float bar_phase = 8;
  float beats = 9; // free-running musical position (beats, wrapped) for LFO previews
}

// A named, triggerable text slot (the lettering bank).
message TextSlot {
  int32 id = 1;
  string text = 2;
}

// A modulation route: a source signal driving a parameter by an amount.
message ModRoute {
  string source = 1;
  string target = 2;
  float amount = 3;
  float smooth = 4; // 0 = instant, 1 = very smooth
}

message ServerMsg {
  // Sent in full on connect; empty on delta updates.
  repeated ParamSpec schema = 1;
  repeated string generators = 2;
  // Value updates (also the full set on connect).
  repeated ParamValue changes = 3;
  Telemetry telemetry = 4;
  repeated TextSlot text = 5;
  // Available modulation source ids (sent on connect).
  repeated string mod_sources = 6;
  // Current modulation routes. `mod_routes_present` distinguishes "no route
  // info in this message" from "routes are now empty" (proto3 omits empty
  // repeated fields on the wire).
  repeated ModRoute mod_routes = 7;
  bool mod_routes_present = 8;
  // Available preset names (builtins + user), sent on connect and after a save.
  repeated string presets = 9;
  // Name of the preset currently loaded, for highlighting in the browser.
  string current_preset = 10;
  // Active MIDI/OSC bindings (`mappings_present` distinguishes "no info" from
  // "now empty").
  repeated MidiMap mappings = 11;
  bool mappings_present = 12;
  // JPEG bytes of a downscaled live output frame (sent on its own at ~10 fps).
  bytes preview = 13;
  // Media file labels for the media-layer source dropdowns (index 0 = none).
  repeated string media = 14;
  // I/O devices: available audio inputs + the selected one, available MIDI
  // hardware ports + the active filter. `devices_present` distinguishes "no
  // device info in this message" from a genuinely empty list.
  repeated string audio_devices = 15;
  string audio_device = 16;
  repeated string midi_ports = 17;
  string midi_port = 18;
  bool devices_present = 19;
  // Scripting: available script names, a script source to load into the editor,
  // and a compile/runtime error string. The *_present flags distinguish an
  // absent field from an intentionally empty one.
  repeated string scripts = 20;
  string script = 21;
  bool script_present = 22;
  string script_error = 23;
  bool script_error_present = 24;
  // Mesh file labels for the wireframe generator's mesh dropdown (0 = shapes).
  repeated string meshes = 25;
  // ISF: available shader names (index 0 = off), the selected shader's inputs
  // (mapped onto the isf.<slot> param pool) and the last compile error.
  repeated string isf_shaders = 26;
  bool isf_present = 27;
  repeated IsfInput isf_inputs = 28;
  bool isf_inputs_present = 29;
  string isf_error = 30;
}

// One ISF shader input, bound to the parameter pool starting at `slot`.
message IsfInput {
  string label = 1;
  string kind = 2;  // float / bool / long / color / point2D / event
  int32 slot = 3;
}

// --- Client -> server ---

message SetParam {
  string path = 1;
  bool is_norm = 2;  // interpret `value` as 0..1 (true) or raw (false)
  float value = 3;
  bool trigger = 4;  // fire a momentary trigger param instead of setting
  bool release = 5;  // release a gated/held target (pointer-up / note-off)
}

// An active MIDI/OSC binding, for the mapping list.
message MidiMap {
  string source = 1; // e.g. "CC1.7", "Note1.60"
  string target = 2; // param path
  string mode = 3;   // absolute / toggle / trigger / gate / relative
}

message LearnCmd {
  string path = 1;
  bool arm = 2;    // arm MIDI/OSC learn for this param
  bool clear = 3;  // clear mappings for this param
}

message PresetCmd {
  string action = 1; // "save" | "load"
  string path = 2;
}

// Edit the text bank (set or clear a slot's text).
message TextCmd {
  int32 id = 1;
  string text = 2;
}

// Add/update (amount != 0) or remove (amount == 0) a modulation route.
message ModRouteCmd {
  string source = 1;
  string target = 2;
  float amount = 3;
  float smooth = 4;
}

// Select an input device. `kind` is "audio" or "midi"; an empty `name` means
// the system default (audio) / all hardware ports (midi).
message DeviceCmd {
  string kind = 1;
  string name = 2;
}

// Edit/run/save/load a JS script. `action` is "apply" (run live), "save"
// (store as `name` then run) or "load" (fetch `name`, run, echo to the editor).
message ScriptCmd {
  string action = 1;
  string name = 2;
  string source = 3;
}

message ClientMsg {
  SetParam set = 1;
  LearnCmd learn = 2;
  PresetCmd preset = 3;
  TextCmd text = 4;
  ModRouteCmd mod = 5;
  DeviceCmd device = 6;
  // Re-scan the media directory for newly added files.
  bool rescan_media = 7;
  ScriptCmd script = 8;
}
